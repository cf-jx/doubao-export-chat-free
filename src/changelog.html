<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>豆包导出更新说明</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --text: #15181d;
      --muted: #687182;
      --border: #e6e8ee;
      --accent: #2f6feb;
      --accent-soft: #eaf1ff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.7;
    }
    main {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 64px;
    }
    .page-header {
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .page-header p {
      margin: 0;
      color: var(--muted);
    }
    .release-stack {
      display: grid;
      gap: 16px;
    }
    .release-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: 0 12px 30px rgba(25, 30, 40, 0.06);
      overflow: hidden;
    }
    .release-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #ffffff, #fbfcff);
    }
    .release-card__version {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
    }
    .release-card__anchor {
      color: var(--muted);
      text-decoration: none;
      font-weight: 700;
    }
    .release-card__body {
      padding: 20px 22px 24px;
    }
    .release-card__body h3,
    .release-card__body h4 {
      margin: 22px 0 8px;
      font-size: 17px;
      line-height: 1.35;
    }
    .release-card__body h3:first-child,
    .release-card__body h4:first-child,
    .release-card__body p:first-child {
      margin-top: 0;
    }
    p, ul, ol, pre {
      margin: 10px 0;
    }
    ul, ol {
      padding-left: 1.35em;
    }
    code {
      border-radius: 6px;
      background: #f1f3f7;
      padding: 2px 5px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }
    pre {
      overflow: auto;
      border-radius: 10px;
      background: #f1f3f7;
      padding: 12px 14px;
    }
    pre code {
      padding: 0;
      background: transparent;
    }
    @media (max-width: 520px) {
      main {
        width: min(100% - 20px, 760px);
        padding: 28px 0 48px;
      }
      .release-card__header,
      .release-card__body {
        padding-left: 16px;
        padding-right: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="page-header">
      <h1>豆包导出更新说明</h1>
      <p>最新版本在最上方。每次发布后由仓库里的 RELEASE_NOTES 自动生成。</p>
    </header>
    <section class="release-stack" aria-label="更新记录">

      <article class="release-card" id="v1.0.0">
        <header class="release-card__header">
          <span class="release-card__version">v1.0.0</span>
          <a class="release-card__anchor" href="#v1.0.0" aria-label="Link to v1.0.0">#</a>
        </header>
        <div class="release-card__body">
          <p>发布日期：2026-07-09</p>
          <h3>本次发布</h3>
          <ul>
          <li>首个 Chrome Web Store 免费版。</li>
          <li>支持将当前豆包网页对话导出为 Markdown、HTML、JSON 和 TXT。</li>
          <li>支持导出消息时间、按日期范围导出、大对话自动分片。</li>
          <li>关于页改为免费版说明，不再展示收费版入口或个人联系方式。</li>
          </ul>
          <h3>隐私说明</h3>
          <ul>
          <li>本工具仅供用户本地备份本人账号聊天记录。</li>
          <li>导出处理在当前浏览器本地完成，数据不上传服务器。</li>
          </ul>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
