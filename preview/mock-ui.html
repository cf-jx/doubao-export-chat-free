<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Doubao Export UI Mock</title>
    <link rel="stylesheet" href="../src/styles/ui-tokens.css" />
    <link rel="stylesheet" href="../src/styles/ui-shell.css" />
    <link rel="stylesheet" href="../src/styles/dialog.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--dbx-font-sans);
        background: var(--dbx-color-bg);
      }

      .preview-shell {
        min-height: 100vh;
        position: relative;
      }

      .dbx-overlay {
        position: relative;
        min-height: 100vh;
        padding: 32px;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        background: transparent;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <div class="dbx-overlay" id="mock-overlay">
        <div
          class="dbx-dialog"
          id="mock-dialog"
          role="dialog"
          aria-modal="true"
          aria-label="豆包导出面板"
          style="width:min(440px, calc(100vw - 32px)); height:min(440px, calc(100vh - 32px));">
          <div class="dbx-titlebar">
            <div class="dbx-window-controls" aria-label="窗口操作">
              <button type="button" class="dbx-window-btn dbx-window-btn--close" data-window-action="close" aria-label="关闭窗口" title="关闭"><svg viewBox="0 0 8 8" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"><path d="M2.2 2.2L5.8 5.8M5.8 2.2L2.2 5.8"/></svg></button>
              <button type="button" class="dbx-window-btn dbx-window-btn--drag" data-window-action="drag" aria-label="拖动窗口" title="拖动面板"><svg viewBox="0 0 8 8" aria-hidden="true" focusable="false"><g fill="currentColor"><circle cx="2.8" cy="2.4" r="0.55"/><circle cx="2.8" cy="4" r="0.55"/><circle cx="2.8" cy="5.6" r="0.55"/><circle cx="5.2" cy="2.4" r="0.55"/><circle cx="5.2" cy="4" r="0.55"/><circle cx="5.2" cy="5.6" r="0.55"/></g></svg></button>
              <button type="button" class="dbx-window-btn dbx-window-btn--reset" data-window-action="reset" aria-label="重置位置" title="重置位置"><svg viewBox="0 0 8 8" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3V2H3M5 2H6V3M6 5V6H5M3 6H2V5"/></svg></button>
            </div>
            <div class="dbx-titlebar-copy">豆包导出助手</div>
            <div class="dbx-titlebar-actions">
              <button type="button" class="dbx-about-action" data-action="toggle-about" aria-label="关于" aria-expanded="false" title="关于">
                <svg class="dbx-about-action-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <circle cx="12" cy="12" r="7.25" stroke="currentColor" stroke-width="1.7"></circle>
                  <path d="M12 10.75V16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></path>
                  <path d="M12 8H12.01" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"></path>
                </svg>
              </button>
            </div>
          </div>

          <div class="dbx-shell-body">
            <div class="dbx-content">
              <section id="mock-panel-current" class="dbx-panel-view is-visible" data-panel="current">
                <div class="dbx-section-stack">
                  <div class="dbx-card dbx-format-card">
                    <div class="dbx-status-title">导出格式</div>
                    <div class="dbx-format-grid">
                      <div class="dbx-format-item is-active">
                        <button type="button" class="dbx-format is-active" data-format="md" aria-pressed="true">
                          <span class="dbx-format-icon-wrap">
                            <svg class="dbx-format-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                              <path d="M7.25 4.75H13.5L17.25 8.5V18a1.25 1.25 0 0 1-1.25 1.25H7.25A1.25 1.25 0 0 1 6 18V6A1.25 1.25 0 0 1 7.25 4.75Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"></path>
                              <path d="M13.25 4.75V8.75H17.25" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"></path>
                            </svg>
                          </span>
                          <span class="dbx-format-copy">
                            <span class="dbx-format-label">Markdown</span>
                            <span class="dbx-format-note">阅读整理</span>
                          </span>
                        </button>
                      </div>
                      <div class="dbx-format-item">
                        <button type="button" class="dbx-format" data-format="html" aria-pressed="false">
                          <span class="dbx-format-icon-wrap">
                            <svg class="dbx-format-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                              <path d="M5 4.5L6 19.5L12 21L18 19.5L19 4.5H5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"></path>
                              <path d="M8.5 8.25H15.5L15 12L12 12.9L9 12L8.75 10.25" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                          </span>
                          <span class="dbx-format-copy">
                            <span class="dbx-format-label">HTML</span>
                            <span class="dbx-format-note">网页搜索</span>
                          </span>
                        </button>
                      </div>
                      <div class="dbx-format-item">
                        <button type="button" class="dbx-format" data-format="json" aria-pressed="false">
                          <span class="dbx-format-icon-wrap">
                            <svg class="dbx-format-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                              <path d="M8 7C6.5 7 5.75 7.75 5.75 9.25V10.25C5.75 11.35 5.35 12 4.5 12C5.35 12 5.75 12.65 5.75 13.75V14.75C5.75 16.25 6.5 17 8 17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
                              <path d="M16 7C17.5 7 18.25 7.75 18.25 9.25V10.25C18.25 11.35 18.65 12 19.5 12C18.65 12 18.25 12.65 18.25 13.75V14.75C18.25 16.25 17.5 17 16 17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
                            </svg>
                          </span>
                          <span class="dbx-format-copy">
                            <span class="dbx-format-label">JSON</span>
                            <span class="dbx-format-note">程序处理</span>
                          </span>
                        </button>
                      </div>
                      <div class="dbx-format-item">
                        <button type="button" class="dbx-format" data-format="txt" aria-pressed="false">
                          <span class="dbx-format-icon-wrap">
                            <svg class="dbx-format-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                              <path d="M7.25 4.75H16.75A1.25 1.25 0 0 1 18 6V18A1.25 1.25 0 0 1 16.75 19.25H7.25A1.25 1.25 0 0 1 6 18V6A1.25 1.25 0 0 1 7.25 4.75Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"></path>
                              <path d="M8.75 9H15.25M8.75 12H15.25M8.75 15H13.25" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
                            </svg>
                          </span>
                          <span class="dbx-format-copy">
                            <span class="dbx-format-label">TXT</span>
                            <span class="dbx-format-note">纯文本</span>
                          </span>
                        </button>
                      </div>
                    </div>
                  </div>

                  <div class="dbx-panel-tail">
                    <div class="dbx-bottom-option-wrap">
                      <div class="dbx-bottom-option">
                        <div class="dbx-bottom-option-copy">
                          <span class="dbx-bottom-option-label">导出消息时间</span>
                          <span class="dbx-bottom-option-note">默认不写出每条消息的发送时间</span>
                        </div>
                        <button type="button" class="dbx-switch" data-timestamp-mode-toggle="true" role="switch" aria-checked="false" aria-label="导出消息时间">
                          <span class="dbx-switch-thumb" aria-hidden="true"></span>
                        </button>
                      </div>
                      <div class="dbx-bottom-option">
                        <div class="dbx-bottom-option-copy">
                          <span class="dbx-bottom-option-label">内嵌图片</span>
                          <span class="dbx-bottom-option-note">默认清洗图片，仅保留文字内容</span>
                        </div>
                        <button type="button" class="dbx-switch" data-image-mode-toggle="true" role="switch" aria-checked="false" aria-label="内嵌图片">
                          <span class="dbx-switch-thumb" aria-hidden="true"></span>
                        </button>
                      </div>
                      <div class="dbx-bottom-option dbx-bottom-option--split">
                        <div class="dbx-bottom-option-copy">
                          <span class="dbx-bottom-option-label">大对话自动分片</span>
                          <span class="dbx-bottom-option-note">关闭时始终输出单文件</span>
                        </div>
                        <button type="button" class="dbx-switch is-active" data-split-mode-toggle="true" role="switch" aria-checked="true" aria-label="大对话自动分片">
                          <span class="dbx-switch-thumb" aria-hidden="true"></span>
                        </button>
                      </div>
                      <div class="dbx-date-range-option">
                        <div class="dbx-bottom-option">
                          <div class="dbx-bottom-option-copy">
                            <span class="dbx-bottom-option-label">按日期范围导出</span>
                            <span class="dbx-bottom-option-note">默认导出全部已捕获消息</span>
                          </div>
                          <button type="button" class="dbx-switch" data-date-range-toggle="true" role="switch" aria-checked="false" aria-label="按日期范围导出">
                            <span class="dbx-switch-thumb" aria-hidden="true"></span>
                          </button>
                        </div>
                        <div class="dbx-date-range-fields" hidden>
                          <label class="dbx-date-field">
                            <span>开始</span>
                            <input class="dbx-date-input" type="date" data-date-range-start="true" aria-label="开始日期">
                          </label>
                          <label class="dbx-date-field">
                            <span>结束</span>
                            <input class="dbx-date-input" type="date" data-date-range-end="true" aria-label="结束日期">
                          </label>
                        </div>
                      </div>
                    </div>

                    <div class="dbx-diagnostics">
                      <button type="button" class="dbx-disclosure" data-diagnostics-toggle="current" aria-expanded="false" aria-controls="mock-diagnostics-current">
                        <span class="dbx-disclosure-copy">
                          <span class="dbx-disclosure-label">高级信息</span>
                          <span class="dbx-disclosure-note">默认收起的补充信息</span>
                        </span>
                        <span class="dbx-disclosure-icon" aria-hidden="true">
                          <svg viewBox="0 0 24 24" fill="none">
                            <path d="M7.75 10.25 12 14.5l4.25-4.25" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
                          </svg>
                        </span>
                      </button>
                      <div class="dbx-details-content" id="mock-diagnostics-current" hidden></div>
                    </div>
                  </div>
                </div>
              </section>
            </div>

            <div class="dbx-about-scrim" data-action="close-about" aria-hidden="true"></div>
            <aside id="mock-about-drawer" class="dbx-about-drawer" data-drawer="about" aria-label="关于" aria-hidden="true">
              <div class="dbx-about-drawer-head">
                <h2>关于</h2>
                <button type="button" class="dbx-drawer-close" data-action="close-about" aria-label="关闭关于" title="关闭">
                  <svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4.5 4.5 11.5 11.5M11.5 4.5 4.5 11.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></path></svg>
                </button>
              </div>
              <div class="dbx-about">
                <div class="dbx-about-header">
                  <div class="dbx-about-logo">
                    <svg class="dbx-trigger-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M6 5.75h7.25c2.623 0 4.75 2.127 4.75 4.75v.25c0 2.623-2.127 4.75-4.75 4.75H11l-3.5 2v-2H6A3.25 3.25 0 0 1 2.75 12V9A3.25 3.25 0 0 1 6 5.75Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"></path>
                      <path d="M8 9.5h6M8 12.5h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
                    </svg>
                  </div>
                  <div>
                    <h3 class="dbx-about-title">豆包导出助手</h3>
                    <span class="dbx-about-version">v1.0.0 免费版</span>
                  </div>
                </div>
                <p class="dbx-about-desc">本工具仅供用户本地备份本人账号聊天记录，数据不上传服务器。</p>
                <p class="dbx-about-desc">支持导出 Markdown、HTML、JSON 与 TXT。所有处理都在当前浏览器本地完成。</p>
              </div>
            </aside>
          </div>

          <div class="dbx-footer">
            <div class="dbx-footer-meta" id="mock-footer-meta"></div>
            <div class="dbx-footer-feedback" id="mock-footer-feedback" role="status" aria-live="polite" hidden>
              <div class="dbx-progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                <div class="dbx-progress-fill" style="width: 0%"></div>
              </div>
              <span class="dbx-feedback-text"></span>
              <span class="dbx-progress-label">0%</span>
            </div>
            <div class="dbx-footer-actions">
              <button type="button" class="dbx-button is-secondary" id="mock-secondary"></button>
              <button type="button" class="dbx-button is-primary" id="mock-primary"></button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./mock-ui.js"></script>
  </body>
</html>
